{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kite.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kite.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.jwtSecret | b64enc | quote }}
  KITE_ENCRYPT_KEY: {{ .Values.encryptKey | b64enc | quote }}
  {{- if and (ne .Values.db.type "sqlite") (ne (include "kite.postgresNativeEnabled" .) "true") }}
  DB_TYPE: {{ .Values.db.type | b64enc | quote }}
  DB_DSN: {{ .Values.db.dsn | b64enc | quote }}
  {{- end }}
  {{- if .Values.superUser.create }}
  KITE_USERNAME: {{ .Values.superUser.username | b64enc | quote }}
  KITE_PASSWORD: {{ .Values.superUser.password | b64enc | quote }}
  {{- end }}
  {{- if and .Values.helmCatalog.oci.password (not .Values.helmCatalog.oci.passwordSecretName) }}
  KITE_HELM_OCI_REGISTRY_PASSWORD: {{ .Values.helmCatalog.oci.password | b64enc | quote }}
  {{- end }}
  {{- if and .Values.helmCatalog.imageUploads.password (not .Values.helmCatalog.imageUploads.passwordSecretName) }}
  KITE_IMAGE_UPLOAD_REGISTRY_PASSWORD: {{ .Values.helmCatalog.imageUploads.password | b64enc | quote }}
  {{- end }}
{{- end }}
