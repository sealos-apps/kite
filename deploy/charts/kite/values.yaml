# Default values for kite.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: crpi-7jr40k6elhldekqp.cn-hangzhou.personal.cr.aliyuncs.com/mlhiter/kite
  pullPolicy: IfNotPresent
  tag: '1.0.8'

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

debug: false

# External Host for the application.
# Leave empty to obtain from request headers.
host: ''

# If serving kite under a sub-path, set this value.
basePath: ''

anonymousUserEnabled: false

# Ignored if using secret.existingSecret.
jwtSecret: 'kite-default-jwt-secret-key-change-in-production'
encryptKey: 'kite-default-encryption-key-change-in-production'

# Sealos cluster metadata.
# cloudDomain is commonly injected by deploy/install.sh from
# configmap sealos-config in namespace sealos-system.
cloudDomain: '127.0.0.1.nip.io'

# Sealos-related runtime values.
sealos:
  # Injected as env SEALOS_JWT_SECRET when non-empty.
  jwtSecret: ''

superUser:
  create: false
  username: 'admin'
  password: ''

secret:
  create: true
  existingSecret: ''

# Database configuration
# type: sqlite | postgres | mysql
db:
  type: postgres
  dsn: ''

  postgres:
    database: postgres
    sslMode: disable
    extraOptions: ''

    native:
      enabled: true
      clusterName: kite-pg
      credentialSecretName: ''
      version: postgresql-14.8.0
      replicas: 3
      storage: 3Gi
      backup:
        enabled: true
        cron: '0 7 * * *'
        retentionPeriod: 7d
      resources:
        limits:
          cpu: 1000m
          memory: 1024Mi
        requests:
          cpu: 10m
          memory: 50Mi
      terminationPolicy: Delete

  sqlite:
    persistence:
      pvc:
        enabled: false
        existingClaim: ''
        storageClass: ''
        accessModes:
          - ReadWriteOnce
        size: 1Gi
      hostPath:
        enabled: false
        path: /path/to/host/dir
        type: DirectoryOrCreate
      mountPath: /data
      filename: kite.db
    options: ''

extraEnvs:
  - name: SEALOS_AUTH_ENABLED
    value: 'true'
  - name: AUTH_COOKIE_SAMESITE
    value: 'none'
  - name: AUTH_COOKIE_SECURE
    value: 'true'
  - name: SEALOS_DEFAULT_PROMETHEUS_URL
    value: 'http://vmselect-vm-stack-victoria-metrics-k8s-stack.vm.svc:8481/select/0/prometheus'
  - name: KITE_NAMESPACE_SCOPE_EXEMPT_NAMESPACES
    value: 'ns-admin'

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ''

rbac:
  create: true
  rules:
    - apiGroups: ['*']
      resources: ['*']
      verbs: ['*']
    - nonResourceURLs: ['*']
      verbs: ['*']

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080

# Sealos-style simplified ingress config.
ingress:
  enabled: true

# Sealos App CR creation.
app:
  enabled: false

# Optional：Gateway API resources for exposing Kite.
# This can be used as an alternative to ingress.
gateway:
  enabled: false
  className: ''
  create: false
  name: ''
  namespace: ''
  annotations: {}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
  httpRoutes:
    - name: kite
      annotations: {}
      hostnames: []
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /

resources: {}

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  failureThreshold: 24
  timeoutSeconds: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
