name: Build PR Sealos Image Artifact

permissions:
  contents: read

concurrency:
  group: pr-sealos-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  LOCAL_REGISTRY: '127.0.0.1:5000/sealos-kite-pr'

jobs:
  sealos:
    name: Build PR Sealos Image Tar
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Install deps
        run: make deps

      - name: Build
        run: make cross-compile

      - name: Generate image tags
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          PR_IMAGE_TAG="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "pr_tag=${PR_IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.binary
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          tags: sealos-kite-pr-runtime:${{ steps.meta.outputs.pr_tag }}
          labels: runnumber=${{ github.run_id }}

      - name: Start temporary local registry
        run: |
          set -euo pipefail
          docker rm -f sealos-kite-pr-registry >/dev/null 2>&1 || true
          docker run -d -p 5000:5000 --name sealos-kite-pr-registry registry:2

      - name: Push runtime image to temporary local registry
        run: |
          set -euo pipefail
          RUNTIME_TAG="${{ steps.meta.outputs.pr_tag }}"
          REGISTRY_IMAGE="${LOCAL_REGISTRY}/sealos-kite-pr-runtime:${RUNTIME_TAG}"
          docker tag "sealos-kite-pr-runtime:${RUNTIME_TAG}" "${REGISTRY_IMAGE}"
          docker push "${REGISTRY_IMAGE}"

      - name: Install cache images tools
        run: sudo bash ./.github/scripts/install.sh

      - name: Cache images for sealos
        working-directory: deploy
        run: |
          set -euo pipefail
          RUNTIME_TAG="${{ steps.meta.outputs.pr_tag }}"
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*repository:[[:space:]]*\).*#\1${LOCAL_REGISTRY}/sealos-kite-pr-runtime#" charts/sealos-kite/values.yaml
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*tag:[[:space:]]*\).*#\1${RUNTIME_TAG}#" charts/sealos-kite/values.yaml
          sudo sealos registry save --registry-dir=registry_amd64 --arch amd64 .
          cp -R registry_amd64 registry_arm64

      - name: Build sealos image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./deploy
          file: ./deploy/Kubefile
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          tags: sealos-kite-cluster-pr:${{ steps.meta.outputs.pr_tag }}-amd64
          labels: runnumber=${{ github.run_id }}

      - name: Save sealos image tar
        run: |
          set -euo pipefail
          mkdir -p artifacts
          TAR_NAME="sealos-kite-cluster-pr-${{ github.event.pull_request.number }}-${{ steps.meta.outputs.short_sha }}-amd64.tar"
          docker save "sealos-kite-cluster-pr:${{ steps.meta.outputs.pr_tag }}-amd64" -o "artifacts/${TAR_NAME}"
          gzip -f "artifacts/${TAR_NAME}"

      - name: Upload sealos image tar
        uses: actions/upload-artifact@v4
        with:
          name: sealos-kite-cluster-pr-${{ github.event.pull_request.number }}-${{ steps.meta.outputs.short_sha }}-amd64
          path: artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup temporary local registry
        if: always()
        run: docker rm -f sealos-kite-pr-registry >/dev/null 2>&1 || true
