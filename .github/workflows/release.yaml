name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '24'
  GHCR_REPO: ghcr.io/${{ github.repository }}
  GHCR_RUNTIME_IMAGE: ghcr.io/${{ github.repository }}/sealos-kite
  GHCR_SEALOS_IMAGE: ghcr.io/${{ github.repository }}/sealos-kite-cluster

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
      oss_prefix: ${{ steps.vars.outputs.oss_prefix }}
      oss_region: ${{ steps.vars.outputs.oss_region }}
    steps:
      - name: Prepare release variables
        id: vars
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_REGION_INPUT: ${{ vars.OSS_REGION }}
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "oss_prefix=releases/${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          
          if [ -n "${OSS_REGION_INPUT}" ]; then
            OSS_REGION="${OSS_REGION_INPUT}"
          else
            OSS_HOST="${OSS_ENDPOINT#http://}"
            OSS_HOST="${OSS_HOST#https://}"
            OSS_HOST="${OSS_HOST%%/*}"
            if [[ "$OSS_HOST" =~ ^oss-([a-z0-9-]+)(-internal)?\.aliyuncs\.com$ ]]; then
              OSS_REGION="${BASH_REMATCH[1]}"
            else
              echo "failed to infer OSS region from OSS_ENDPOINT=${OSS_ENDPOINT}" >&2
              exit 1
            fi
          fi
          
          echo "oss_region=${OSS_REGION}" >> "$GITHUB_OUTPUT"

  meta:
    name: Release Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      is_release: ${{ steps.meta.outputs.is_release }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      tag_with_sha: ${{ steps.meta.outputs.tag_with_sha }}
    steps:
      - name: Compute tags
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            IS_RELEASE="true"
          else
            TAG_NAME="main"
            IS_RELEASE="false"
          fi
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          TAG_WITH_SHA="${TAG_NAME}-${SHORT_SHA}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "is_release=${IS_RELEASE}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "tag_with_sha=${TAG_WITH_SHA}" >> "${GITHUB_OUTPUT}"

  runtime-build:
    name: Build Runtime Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: meta
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Install deps
        run: make deps

      - name: Build binaries
        run: make build-arch ARCH=${{ matrix.arch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image (arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.binary
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.GHCR_RUNTIME_IMAGE }}:${{ needs.meta.outputs.tag_name }}-${{ matrix.arch }}
            ${{ env.GHCR_RUNTIME_IMAGE }}:${{ needs.meta.outputs.tag_with_sha }}-${{ matrix.arch }}
          labels: runnumber=${{ github.run_id }}

  runtime-manifest:
    name: Publish Runtime Manifests
    runs-on: ubuntu-latest
    needs: [meta, runtime-build]
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create runtime multi-arch manifests
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.meta.outputs.tag_name }}"
          TAG_WITH_SHA="${{ needs.meta.outputs.tag_with_sha }}"
          docker buildx imagetools create \
            -t "${GHCR_RUNTIME_IMAGE}:${TAG_NAME}" \
            "${GHCR_RUNTIME_IMAGE}:${TAG_NAME}-amd64" \
            "${GHCR_RUNTIME_IMAGE}:${TAG_NAME}-arm64"
          docker buildx imagetools create \
            -t "${GHCR_RUNTIME_IMAGE}:${TAG_WITH_SHA}" \
            "${GHCR_RUNTIME_IMAGE}:${TAG_WITH_SHA}-amd64" \
            "${GHCR_RUNTIME_IMAGE}:${TAG_WITH_SHA}-arm64"

  sealos-build:
    name: Build Sealos Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [meta, runtime-manifest]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cache images tools
        run: sudo bash ./.github/scripts/install.sh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache images for sealos
        working-directory: deploy
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.meta.outputs.tag_name }}"
          sudo sealos login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*repository:[[:space:]]*\).*#\1${GHCR_RUNTIME_IMAGE}#" charts/sealos-kite/values.yaml
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*tag:[[:space:]]*\).*#\1${TAG_NAME}#" charts/sealos-kite/values.yaml
          sudo sealos registry save --registry-dir=registry_${{ matrix.arch }} --arch ${{ matrix.arch }} .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sealos image (arch)
        uses: docker/build-push-action@v6
        with:
          context: ./deploy
          file: ./deploy/Kubefile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.GHCR_SEALOS_IMAGE }}:${{ needs.meta.outputs.tag_name }}-${{ matrix.arch }}
            ${{ env.GHCR_SEALOS_IMAGE }}:${{ needs.meta.outputs.tag_with_sha }}-${{ matrix.arch }}
          labels: runnumber=${{ github.run_id }}

      - name: Save sealos image package
        if: ${{ needs.meta.outputs.is_release == 'true' }}
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.meta.outputs.tag_name }}"
          docker pull "${GHCR_SEALOS_IMAGE}:${TAG_NAME}-${{ matrix.arch }}"
          mkdir -p release-assets
          docker save "${GHCR_SEALOS_IMAGE}:${TAG_NAME}-${{ matrix.arch }}" | gzip > "release-assets/sealos-kite-cluster-${TAG_NAME}-${{ matrix.arch }}.tar.gz"

      - name: Upload sealos image package
        if: ${{ needs.meta.outputs.is_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sealos-image-${{ needs.meta.outputs.tag_name }}-${{ matrix.arch }}
          path: release-assets/sealos-kite-cluster-${{ needs.meta.outputs.tag_name }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  sealos-manifest:
    name: Publish Sealos Manifests
    runs-on: ubuntu-latest
    needs: [meta, sealos-build]
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.meta.outputs.tag_name }}"
          TAG_WITH_SHA="${{ needs.meta.outputs.tag_with_sha }}"
          docker buildx imagetools create \
            -t "${GHCR_SEALOS_IMAGE}:${TAG_NAME}" \
            "${GHCR_SEALOS_IMAGE}:${TAG_NAME}-amd64" \
            "${GHCR_SEALOS_IMAGE}:${TAG_NAME}-arm64"
          docker buildx imagetools create \
            -t "${GHCR_SEALOS_IMAGE}:${TAG_WITH_SHA}" \
            "${GHCR_SEALOS_IMAGE}:${TAG_WITH_SHA}-amd64" \
            "${GHCR_SEALOS_IMAGE}:${TAG_WITH_SHA}-arm64"

      - name: Update latest tag
        if: ${{ needs.meta.outputs.is_release == 'true' }}
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.meta.outputs.tag_name }}"
          docker buildx imagetools create \
            -t "${GHCR_SEALOS_IMAGE}:latest" \
            "${GHCR_SEALOS_IMAGE}:${TAG_NAME}-amd64" \
            "${GHCR_SEALOS_IMAGE}:${TAG_NAME}-arm64"

  sync-pve-image-aliyun:
    runs-on: ubuntu-latest
    needs: [prepare, sealos-manifest]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Download sealos packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: sealos-image-${{ needs.meta.outputs.tag_name }}-*
          merge-multiple: true
      - name: Install oss tools
        run: |
          set -euo pipefail
          sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash


      - name: Sync to OSS
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          TAR_NAME="sealos-admin-cluster-${ARCH}.tar"
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          OSS_PREFIX="${{ needs.prepare.outputs.oss_prefix }}"
          OSS_TAR_NAME="sealos-admin-cluster-${RELEASE_TAG}-${ARCH}.tar"
          if [[ -f "${TAR_NAME}" ]]; then
            ossutil64 cp -f -e ${{ secrets.OSS_ENDPOINT }} \
                -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
                -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
                "${TAR_NAME}" \
                "oss://${{ vars.OSS_BUCKET }}/${OSS_PREFIX}/${OSS_TAR_NAME}"
            ossutil64 cp -f -e ${{ secrets.OSS_ENDPOINT }} \
                -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
                -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
                "${TAR_NAME}.md5" \
                "oss://${{ vars.OSS_BUCKET }}/${OSS_PREFIX}/${OSS_TAR_NAME}.md5"
          fi
  
  release-assets:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [meta, sealos-build]
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Download sealos packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: sealos-image-${{ needs.meta.outputs.tag_name }}-*
          merge-multiple: true

      - name: Create Release with sealos packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag_name }}
          name: ${{ needs.meta.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/**/sealos-kite-cluster-${{ needs.meta.outputs.tag_name }}-amd64.tar.gz
            release-assets/**/sealos-kite-cluster-${{ needs.meta.outputs.tag_name }}-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
